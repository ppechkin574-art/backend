version: 2
updates:
  # Pip deps in requirements.txt — security + minor bumps weekly, targeting develop
  - package-ecosystem: "pip"
    directory: "/"
    target-branch: "develop"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "06:00"
      timezone: "Asia/Almaty"
    open-pull-requests-limit: 5
    commit-message:
      prefix: "chore(deps)"
    groups:
      pinned-deps:
        patterns:
          - "*"
        update-types:
          - "minor"
          - "patch"

  # GitHub Actions versions monthly
  - package-ecosystem: "github-actions"
    directory: "/"
    target-branch: "develop"
    schedule:
      interval: "monthly"
    commit-message:
      prefix: "chore(ci)"
