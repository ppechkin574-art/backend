name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    name: ruff lint (BLOCKING)
    runs-on: ubuntu-latest
    # BLOCKING since M4 cleanup. Ruff config in pyproject.toml has surgical
    # ignores for legacy patterns + per-file-ignores for alembic/tests, so
    # the rules that remain catch real bugs. Format check is still advisory
    # (separate `ruff format --check` step) — many files diverge from black
    # style and full reformat is a follow-up.
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install ruff
        run: pip install --no-cache-dir "ruff==0.7.4"

      - name: Lint (style + suspicious patterns)
        run: ruff check src

      - name: Format check (advisory — black-style reflow not done yet)
        run: ruff format --check src
        continue-on-error: true

  security-audit:
    name: pip-audit (CVE scan, BLOCKING)
    runs-on: ubuntu-latest
    # BLOCKING since PR #26 (all 12 known CVEs cleared). New deps with known
    # CVE will fail the build until either (a) bumped to a fixed version,
    # or (b) explicitly suppressed via `--ignore-vuln GHSA-...`.
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install pip-audit
        run: pip install --no-cache-dir "pip-audit==2.7.3"

      - name: Audit requirements.txt
        run: pip-audit --requirement requirements.txt --strict

  syntax-check:
    name: byte-compile (catches typos, missing imports)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Compile every .py
        # No deps install — pure syntax/parse pass. Doesn't catch type errors
        # but catches typos, broken indents, unclosed brackets, missing __init__.py.
        run: python -m compileall -q src alembic

  alembic-heads:
    name: alembic single head (no diverging migrations)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install Alembic only
        run: pip install --no-cache-dir "alembic==1.14.0" "sqlalchemy==2.0.36"

      - name: Verify there is exactly one alembic head
        run: |
          python - <<'PY'
          from alembic.script import ScriptDirectory
          from alembic.config import Config
          cfg = Config("alembic.ini")
          script = ScriptDirectory.from_config(cfg)
          heads = script.get_heads()
          assert len(heads) == 1, f"Expected 1 head, got {len(heads)}: {heads}"
          print(f"alembic head OK: {heads[0]}")
          PY

  pytest:
    name: pytest (unit + smoke against live backend)
    runs-on: ubuntu-latest
    # BLOCKING: a regression in core logic (HMAC sig, OAuth audience, rate
    # limit IP, cache keys) or in any of the smoke endpoints fails the
    # build and prevents merge to main.
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install runtime + dev deps
        # Unit tests import from src/ → need full requirements.txt. Cached
        # layer is fast on subsequent runs.
        run: |
          pip install --no-cache-dir -r requirements.txt
          pip install --no-cache-dir -r requirements-dev.txt

      - name: Run unit tests (pure logic, fast)
        run: pytest tests/unit/ -v --tb=short

      - name: Run smoke tests (against live Railway)
        env:
          BASE_URL: "https://backend-production-f2a1.up.railway.app"
          TEST_ADMIN_PASSWORD: ${{ secrets.TEST_ADMIN_PASSWORD }}
        run: |
          # Run only top-level test_*.py (smoke), exclude tests/unit/ which
          # was just executed.
          pytest tests/ -v --tb=short --ignore=tests/unit
