name: CI

on:
  pull_request:
    branches: [develop, main]
  push:
    branches: [develop, main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    name: ruff lint (BLOCKING)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install ruff
        run: pip install --no-cache-dir "ruff==0.7.4"

      - name: Lint (style + suspicious patterns)
        run: ruff check src

      - name: Format check (advisory — black-style reflow not done yet)
        run: ruff format --check src
        continue-on-error: true

  security-audit:
    name: pip-audit (CVE scan, BLOCKING)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install pip-audit
        run: pip install --no-cache-dir "pip-audit==2.7.3"

      - name: Audit requirements.txt
        run: pip-audit --requirement requirements.txt --strict

  syntax-check:
    name: byte-compile (catches typos, missing imports)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Compile every .py
        run: python -m compileall -q src alembic

  alembic-heads:
    name: alembic single head (no diverging migrations)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install Alembic only
        run: pip install --no-cache-dir "alembic==1.14.0" "sqlalchemy==2.0.36"

      - name: Verify there is exactly one alembic head
        run: |
          python - <<'PY'
          from alembic.script import ScriptDirectory
          from alembic.config import Config
          cfg = Config("alembic.ini")
          script = ScriptDirectory.from_config(cfg)
          heads = script.get_heads()
          assert len(heads) == 1, f"Expected 1 head, got {len(heads)}: {heads}"
          print(f"alembic head OK: {heads[0]}")
          PY

  unit-tests:
    name: pytest unit (BLOCKING)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: "pip"
          cache-dependency-path: |
            requirements.txt
            requirements-dev.txt

      - name: Install runtime + dev deps
        run: pip install -r requirements.txt -r requirements-dev.txt

      - name: Run unit tests
        run: pytest tests/unit/ -v --tb=short

  smoke-tests:
    name: smoke tests (live Railway, non-blocking)
    runs-on: ubuntu-latest
    needs: unit-tests
    # Only on push — skip on PRs to avoid noise when secret may differ
    if: github.event_name == 'push'
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: "pip"
          cache-dependency-path: |
            requirements.txt
            requirements-dev.txt

      - name: Install runtime + dev deps
        run: pip install -r requirements.txt -r requirements-dev.txt

      - name: Run smoke tests against live backend
        env:
          BASE_URL: "https://backend-production-f2a1.up.railway.app"
          TEST_ADMIN_PASSWORD: ${{ secrets.TEST_ADMIN_PASSWORD }}
        run: pytest tests/ -v --tb=short --ignore=tests/unit
