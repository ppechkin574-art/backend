[tool.ruff]
target-version = "py313"
line-length = 120
exclude = [
    "alembic",
    ".venv",
    "venv",
    "__pycache__",
    "*.pyc",
    ".git",
    ".env",
    "dist",
    "build",
]
src = ["src"]

[tool.ruff.lint]
# Production-quality lint set after M4 cleanup. Wide net of bug-likely + style
# rules with surgical ignores for legacy patterns we deliberately keep.
select = [
    "E",   # pycodestyle errors
    "F",   # pyflakes (undefined names, unused imports)
    "W",   # pycodestyle warnings
    "I",   # isort (import order)
    "UP",  # pyupgrade (modern syntax)
    "B",   # flake8-bugbear (likely bugs)
    "C4",  # comprehensions
    "SIM", # simplifications
    "G",   # logging format
    "YTT", # sys.version checks
]
ignore = [
    "E501",  # line too long — black/format owns this
    "E402",  # legacy logger placement between imports (api/dependencies.py)
    "F401",  # DI plumbing imports look unused statically
    "F811",  # redefined-while-unused — legacy duplicate decorator artifacts
    "B008",  # function-call-in-default-argument — fine for FastAPI Depends()
    "B904",  # raise-without-from-inside-except — many legacy spots, low value
    "B017",  # pytest.raises Exception — tests use this on purpose
    "SIM108",  # ternary-instead-of-if-else — readability subjective
    "SIM117",  # combine-if — too aggressive
    "UP007",  # X | Y typing — let pyright/mypy own this, not stylistic
    "UP035",  # deprecated-import — typing.X stays for now
    "I001",  # import block sorting — purely cosmetic, auto-fix in M4 follow-up
    "W291",  # trailing whitespace — purely cosmetic, ditto
]

[tool.ruff.lint.per-file-ignores]
# Migrations are auto-generated and import-heavy — silence noise.
"alembic/versions/*" = ["I001", "F401", "B"]
# Tests intentionally use loose patterns (asserts, fixtures, broad except).
"tests/**/*" = ["B", "SIM"]

[tool.ruff.lint.isort]
# known-first-party not needed because isort is called before ruff

[tool.ruff.format]
quote-style = "double"
indent-style = "space"
skip-magic-trailing-comma = false
line-ending = "auto"

[tool.pytest.ini_options]
testpaths = ["tests"]
python_files = ["test_*.py"]
addopts = "-ra"
pythonpath = ["src"]

[tool.vulture]
exclude = [
    "*/dtos.py",
    "*/dtos/*.py",
    "*/models.py",
    "*/models/*.py",
]
min_confidence = 60
paths = ["src"]
