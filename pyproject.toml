[tool.ruff]
target-version = "py313"
line-length = 120
exclude = [
    "alembic",
    ".venv",
    "venv",
    "__pycache__",
    "*.pyc",
    ".git",
    ".env",
    "dist",
    "build",
]
src = ["src"]

[tool.ruff.lint]
# Conservative core-quality rules. The wider set (style hints I/UP/B/SIM/T20/G/YTT/S/C4/ARG)
# is documented in TECH_DEBT M4 as a follow-up cleanup — currently 89+ legacy
# warnings would block every PR on existing files.
select = [
    "E",  # pycodestyle errors (syntax-adjacent)
    "F",  # pyflakes (undefined names, unused imports — real bugs)
    "W",  # pycodestyle warnings (deprecation)
]
ignore = [
    "E501",  # line too long
    "E402",  # module-level import not at top — legacy logger placement
    "F401",  # unused imports — legacy DI plumbing pulls many "unused" names
    "F811",  # redefined-while-unused — legacy duplicate decorators
]

[tool.ruff.lint.isort]
# known-first-party not needed because isort is called before ruff

[tool.ruff.format]
quote-style = "double"
indent-style = "space"
skip-magic-trailing-comma = false
line-ending = "auto"

[tool.pytest.ini_options]
testpaths = ["tests"]
python_files = ["test_*.py"]
addopts = "-ra"
pythonpath = ["src"]

[tool.vulture]
exclude = [
    "*/dtos.py",
    "*/dtos/*.py",
    "*/models.py",
    "*/models/*.py",
]
min_confidence = 60
paths = ["src"]
