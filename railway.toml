# Railway service configuration.
#
# Healthcheck wiring:
#   * Path /health is exposed by api.routes.system. Returns 200 with a JSON
#     body whenever the Python worker is alive and able to handle requests.
#     Redis status is reported in the body but does NOT gate the status code
#     (a flaky Redis must not cause Railway to restart the worker).
#
#   * healthcheckTimeout is the per-attempt deadline; healthy services
#     respond in <50ms, but we leave headroom for gunicorn pool saturation.
#
# Deploy policy:
#   * `restartPolicyType = "on_failure"` — Railway restarts the worker if it
#     crashes (uvicorn/gunicorn process exit non-zero). Combined with the
#     healthcheck above it covers both "crashed" and "wedged but not
#     crashed" scenarios.
#   * `restartPolicyMaxRetries = 5` — guard against crashloops chewing up
#     Railway minutes if config is broken.

[build]
builder = "DOCKERFILE"
dockerfilePath = "Dockerfile"

[deploy]
# preDeployCommand runs in its own short-lived container BEFORE Railway
# starts the new web replica and its healthcheck window.  Long alembic
# chains (schema ALTER + bulk data import) can't time out the web boot
# any more.  Required after the variant kk pilot landed 22.05.2026 —
# even with bulk-update via unnest the migration phase + python boot
# exceeded the 30s inline healthcheck budget.
preDeployCommand = "alembic upgrade head"

# Dockerfile CMD is now just `python src/main.py` — startCommand stays
# omitted.  Migrations have already been applied by the time this runs.
healthcheckPath = "/health"
healthcheckTimeout = 30
restartPolicyType = "on_failure"
restartPolicyMaxRetries = 5
